version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stockhub-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_TYPE=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USERNAME=root
      - DB_PASSWORD=rootpassword
      - DB_DATABASE=stockhub
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - SMSBAO_USERNAME=${SMSBAO_USERNAME}
      - SMSBAO_PASSWORD=${SMSBAO_PASSWORD}
      - SMSBAO_SIGN=${SMSBAO_SIGN}
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/data:/app/data
    depends_on:
      - mysql
      - redis
    restart: unless-stopped
    networks:
      - stockhub-network

  frontend:
    build:
      context: ./frontend/domestic
      dockerfile: Dockerfile
    container_name: stockhub-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - stockhub-network

  mysql:
    image: mysql:8.0
    container_name: stockhub-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=stockhub
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"
    restart: unless-stopped
    networks:
      - stockhub-network

  redis:
    image: redis:alpine
    container_name: stockhub-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - stockhub-network

  nginx:
    image: nginx:alpine
    container_name: stockhub-nginx
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - stockhub-network

volumes:
  mysql-data:
  redis-data:

networks:
  stockhub-network:
    driver: bridge
