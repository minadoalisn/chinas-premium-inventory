<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockHub - Global Inventory Marketplace</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      max-width: 800px;
      padding: 20px;
    }
    h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }
    p {
      font-size: 1.2rem;
      margin: 1rem 0;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
    }
    .status {
      background: rgba(255,255,255,0.2);
      padding: 20px;
      border-radius: 10px;
      margin: 20px 0;
      backdrop-filter: blur(10px);
    }
    .test-btn {
      display: inline-block;
      background: white;
      color: #667eea;
      padding: 15px 30px;
      border-radius: 30px;
      font-size: 1rem;
      font-weight: bold;
      text-decoration: none;
      margin: 10px;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .test-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📦 StockHub Global</h1>
    <p>Global Inventory Marketplace</p>
    <div class="status">
      <p>✅ Website is running normally</p>
      <p>✅ Server response is normal</p>
      <p>✅ Data connection is stable</p>
    </div>
    <p style="font-size: 0.9rem; opacity: 0.9;">Version: v202604041020</p>
  </div>
</body>
</html>
