<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Cancelled - StockHub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .container {
      max-width: 500px;
      margin: 40px 20px;
      background: rgba(255,255,255,0.05);
      border-radius: 30px;
      padding: 50px 40px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.1);
      animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .cancel-icon {
      width: 120px;
      height: 120px;
      background: linear-gradient(135deg, #ef4444, #dc2626);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 30px;
      font-size: 60px;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 15px;
      color: #ef4444;
    }
    .subtitle {
      color: #888;
      font-size: 1rem;
      margin-bottom: 40px;
      line-height: 1.6;
    }
    .info-box {
      background: rgba(255,255,255,0.03);
      border-radius: 15px;
      padding: 25px;
      margin-bottom: 30px;
      text-align: left;
    }
    .info-box h3 {
      color: #888;
      margin-bottom: 15px;
      font-size: 0.95rem;
    }
    .info-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      color: #ccc;
      font-size: 0.9rem;
    }
    .info-item span { font-size: 1.2rem; }
    .btn-group {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      padding: 15px 30px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-primary {
      background: linear-gradient(90deg, #e94560, #ff6b6b);
      border: none;
      color: #fff;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(233,69,96,0.4);
    }
    .btn-secondary {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.1);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="cancel-icon">✕</div>
    
    <h1>Payment Cancelled</h1>
    <p class="subtitle">Your payment was cancelled and no charges were made to your card.</p>
    
    <div class="info-box">
      <h3>What would you like to do?</h3>
      <div class="info-item">
        <span>🔄</span>
        <span>Try again with a different payment method</span>
      </div>
      <div class="info-item">
        <span>🛒</span>
        <span>Return to shopping and browse more products</span>
      </div>
      <div class="info-item">
        <span>📞</span>
        <span>Contact support if you need assistance</span>
      </div>
    </div>
    
    <div class="btn-group">
      <a href="/checkout.html" class="btn btn-primary">
        ← Try Again
      </a>
      <a href="/" class="btn btn-secondary">
        Continue Shopping
      </a>
    </div>
  </div>

  <script>
    // 检查是否有未完成的订单数据
    const orderData = sessionStorage.getItem('pendingOrder');
    if (orderData) {
      console.log('Pending order data found:', orderData);
    }
  </script>
</body>
</html>
