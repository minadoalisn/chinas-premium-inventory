<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - StockHub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .login-container {
      width: 100%;
      max-width: 450px;
      padding: 20px;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 25px;
      padding: 45px 40px;
      backdrop-filter: blur(10px);
    }
    .logo {
      text-align: center;
      margin-bottom: 35px;
    }
    .logo h1 {
      font-size: 2rem;
      background: linear-gradient(90deg, #e94560, #fbbf24);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .logo p {
      color: #666;
      font-size: 0.95rem;
    }
    .form-group {
      margin-bottom: 25px;
    }
    .form-group label {
      display: block;
      margin-bottom: 10px;
      color: #888;
      font-size: 0.9rem;
    }
    .input-wrapper {
      position: relative;
    }
    .input-icon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.2rem;
      color: #666;
    }
    .form-group input {
      width: 100%;
      padding: 16px 16px 16px 50px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: #fff;
      font-size: 1rem;
      transition: all 0.3s;
    }
    .form-group input:focus {
      outline: none;
      border-color: #e94560;
      box-shadow: 0 0 20px rgba(233,69,96,0.2);
    }
    .form-group input::placeholder {
      color: #555;
    }
    .btn-login {
      width: 100%;
      padding: 18px;
      background: linear-gradient(90deg, #e94560, #ff6b6b);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }
    .btn-login:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 35px rgba(233,69,96,0.4);
    }
    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .divider {
      display: flex;
      align-items: center;
      margin: 30px 0;
      color: #555;
      font-size: 0.85rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.1);
    }
    .divider span {
      padding: 0 20px;
    }
    .social-login {
      display: flex;
      gap: 15px;
      margin-bottom: 25px;
    }
    .btn-social {
      flex: 1;
      padding: 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: #fff;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn-social:hover {
      background: rgba(255,255,255,0.1);
      border-color: #e94560;
    }
    .btn-social span {
      font-size: 0.9rem;
    }
    .form-footer {
      text-align: center;
      margin-top: 25px;
      color: #666;
      font-size: 0.9rem;
    }
    .form-footer a {
      color: #e94560;
      text-decoration: none;
      font-weight: 600;
    }
    .form-footer a:hover {
      text-decoration: underline;
    }
    .error-msg {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px;
      padding: 12px 15px;
      color: #fca5a5;
      font-size: 0.9rem;
      margin-bottom: 20px;
      display: none;
    }
    .error-msg.show {
      display: block;
      animation: shake 0.5s ease;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    .loading {
      display: none;
      text-align: center;
      padding: 15px;
    }
    .loading.show { display: block; }
    .spinner {
      width: 25px;
      height: 25px;
      border: 3px solid rgba(233,69,96,0.3);
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .success-msg {
      background: rgba(16,185,129,0.15);
      border: 1px solid rgba(16,185,129,0.3);
      border-radius: 10px;
      padding: 12px 15px;
      color: #6ee7b7;
      font-size: 0.9rem;
      margin-bottom: 20px;
      display: none;
    }
    .success-msg.show { display: block; }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="card">
      <div class="logo">
        <h1>🔐 Welcome Back</h1>
        <p>Sign in to your account</p>
      </div>
      
      <div class="error-msg" id="error-msg"></div>
      <div class="success-msg" id="success-msg"></div>
      
      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Email or Phone</label>
          <div class="input-wrapper">
            <span class="input-icon">📧</span>
            <input type="text" id="email" placeholder="Enter your email or phone" required>
          </div>
        </div>
        
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input type="password" id="password" placeholder="Enter your password" required>
          </div>
        </div>
        
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:25px;">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
            <input type="checkbox" id="remember" style="width:18px;height:18px;accent-color:#e94560;">
            <span style="color:#888;font-size:0.9rem;">Remember me</span>
          </label>
          <a href="#" style="color:#e94560;font-size:0.9rem;text-decoration:none;">Forgot password?</a>
        </div>
        
        <button type="submit" class="btn-login" id="btn-submit">
          Sign In
        </button>
        
        <div class="loading" id="loading">
          <div class="spinner"></div>
          <span style="color:#888;font-size:0.9rem;">Signing in...</span>
        </div>
      </form>
      
      <div class="divider"><span>or continue with</span></div>
      
      <div class="social-login">
        <button class="btn-social" onclick="socialLogin('google')">
          🔍 <span>Google</span>
        </button>
        <button class="btn-social" onclick="socialLogin('facebook')">
          📘 <span>Facebook</span>
        </button>
      </div>
      
      <div class="form-footer">
        Don't have an account? <a href="/register.html">Sign up</a>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.hostname === 'localhost' 
      ? 'http://localhost:3000' 
      : '';
    
    // Check if already logged in
    if (localStorage.getItem('authToken')) {
      window.location.href = '/';
    }
    
    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 5000);
    }
    
    function showSuccess(msg) {
      const el = document.getElementById('success-msg');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 3000);
    }
    
    async function handleLogin(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const remember = document.getElementById('remember').checked;
      
      if (!email || !password) {
        showError('Please fill in all fields');
        return;
      }
      
      document.getElementById('btn-submit').disabled = true;
      document.getElementById('loading').classList.add('show');
      
      try {
        // 尝试登录API
        let loginSuccess = false;
        let userData = null;
        
        try {
          const res = await fetch(`${API_BASE}/api/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });
          
          if (res.ok) {
            const data = await res.json();
            if (data.token) {
              loginSuccess = true;
              userData = data.user || { email };
              
              // 保存token
              localStorage.setItem('authToken', data.token);
              localStorage.setItem('user', JSON.stringify(userData));
              
              if (remember) {
                localStorage.setItem('remember', 'true');
              }
            }
          }
        } catch (err) {
          console.log('API login failed, using demo mode');
        }
        
        // 演示模式登录（API不可用时）
        if (!loginSuccess) {
          // 简单验证演示
          if (email === 'demo@example.com' && password === 'demo123') {
            loginSuccess = true;
            userData = { email, name: 'Demo User' };
            localStorage.setItem('authToken', 'demo_token_' + Date.now());
            localStorage.setItem('user', JSON.stringify(userData));
          } else if (email && password && password.length >= 4) {
            // 允许任意邮箱+4位密码注册演示账号
            loginSuccess = true;
            userData = { email, name: email.split('@')[0] };
            localStorage.setItem('authToken', 'demo_token_' + Date.now());
            localStorage.setItem('user', JSON.stringify(userData));
          }
        }
        
        if (loginSuccess) {
          showSuccess('Login successful! Redirecting...');
          
          // 延迟跳转
          setTimeout(() => {
            const redirect = new URLSearchParams(window.location.search).get('redirect') || '/';
            window.location.href = redirect;
          }, 1000);
        } else {
          showError('Invalid email or password');
        }
        
      } catch (err) {
        console.error('Login error:', err);
        showError('Login failed. Please try again.');
      } finally {
        document.getElementById('btn-submit').disabled = false;
        document.getElementById('loading').classList.remove('show');
      }
    }
    
    function socialLogin(provider) {
      alert(`${provider} login coming soon! Use email login for now.`);
    }
  </script>
</body>
</html>
